app:
  port: ${APP_PORT:8080}
  logging: debug
  api-key: ${APP_API_KEY:default-secret-key}
  consul:
    host: consul-service
    port: 8500

server:
  port: ${app.port}

spring:
  application:
    name: tesoreria-umhub-service
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 10000
            readTimeout: 200000
    consul:
      host: ${app.consul.host}
      port: ${app.consul.port}
      discovery:
        prefer-ip-address: true
        tags: tesoreria,umhub

logging:
  level:
    tesoreria.umhub: ${app.logging}
    web: ${app.logging}
    org:
      springframework:
        web: ${app.logging}
        cloud: ${app.logging}
        security: ${app.logging}
    feign: ${app.logging}
    feign.hystrix: ${app.logging}
